[mcp_servers.vision-power]
command = "C:/path/to/VisionPower/mcp/.venv/Scripts/python.exe"
args = ["C:/path/to/VisionPower/mcp/server.py"]
env = { VISION_POWER_API_KEY = "your-vision-api-key", VISION_POWER_MODEL = "mimo-v2.5", VISION_POWER_API_BASE_URL = "https://token-plan-cn.xiaomimimo.com/v1", VISION_POWER_API_PROTOCOL = "openai", VISION_POWER_TIMEOUT = "120" }
